<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Mãos que Ensinam</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="container">
    <div class="card">
      <h2>Cadastro de Usuário</h2>
      <p style="color: var(--text-light); margin-bottom: 2rem;">
        Insira os dados para registrar um novo membro na plataforma.
      </p>

      <div id="alertBox" class="alert"></div>

      <form id="formCadastro">
        <div class="form-group">
          <label for="nome">Nome Completo</label>
          <input type="text" id="nome" name="nome" placeholder="Ex: João Vinícius Sena" required>
        </div>

        <div class="form-group">
          <label for="email">E-mail Institucional ou Pessoal</label>
          <input type="email" id="email" name="email" placeholder="aluno@escola.com" required>
        </div>

        <div class="form-group">
          <label for="matricula">Matrícula (SEDUC / SIAPE)</label>
          <input type="text" id="matricula" name="matricula" placeholder="Ex: 2026001" required>
        </div>

        <div class="form-group">
          <label for="senha">Senha de Acesso</label>
          <input type="password" id="senha" name="senha" placeholder="Crie uma senha segura" required>
        </div>

        <div class="form-group">
          <label for="role">Nível de Acesso</label>
          <select id="role" name="role" required>
            <option value="" disabled selected>Selecione um perfil...</option>
            <option value="MONITOR">Aluno Monitor</option>
            <option value="MULTIPROFISSIONAL">Equipe Multiprofissional</option>
            <option value="COORDENADOR">Coordenação Pedagógica</option>
          </select>
        </div>

        <div id="camposMonitor" style="display: none; background-color: var(--primary-light); padding: 1.5rem; border-radius: var(--radius); margin-bottom: 1.5rem;">
          <h3 style="font-size: 1.1rem; color: var(--primary-color);">Dados Acadêmicos (Monitor)</h3>
          <div class="form-group">
            <label for="turma">Turma</label>
            <input type="text" id="turma" name="turma" placeholder="Ex: 2º Ano de Informática">
          </div>
          <div class="form-group" style="margin-bottom: 0;">
            <label for="turno">Turno</label>
            <select id="turno" name="turno">
              <option value="MANHÃ">Manhã</option>
              <option value="TARDE">Tarde</option>
              <option value="INTEGRAL">Integral</option>
            </select>
          </div>
        </div>

        <div id="camposProfissional" style="display: none; background-color: var(--accent-light); padding: 1.5rem; border-radius: var(--radius); margin-bottom: 1.5rem;">
          <h3 style="font-size: 1.1rem; color: var(--accent-color);">Dados Profissionais e Vínculo</h3>
          
          <div class="form-group" id="blocoEspecialidade">
            <label for="especialidade">Especialidade / Cargo</label>
            <input type="text" id="especialidade" name="especialidade" placeholder="Ex: Psicopedagogo, Fonoaudiólogo">
          </div>
          
          <div class="form-group" style="margin-bottom: 0;">
            <label for="escolaVinculada">Escola Vinculada</label>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
              <select id="escolaVinculada" name="escolaVinculada" style="flex-grow: 1;">
                <option value="" disabled selected>A carregar instituições...</option>
              </select>
              <button type="button" id="btnToggleNovaEscola" class="btn btn-outline" style="min-height: auto; padding: 0.8rem; width: auto;" title="Registar Nova Instituição">
                <i class="fa-solid fa-plus"></i>
              </button>
            </div>
          </div>

          <div id="blocoNovaEscola" style="display: none; background-color: #FFFFFF; padding: 1.5rem; border-radius: var(--radius); margin-top: 1rem; border: 1px dashed var(--primary-color);">
            <h4 style="font-size: 0.95rem; color: var(--primary-color); margin-bottom: 1rem;">Adicionar Instituição à Rede</h4>
            <div class="form-group">
              <input type="text" id="novaEscolaNome" placeholder="Nome (Ex: CETI Domingos Rodrigues de Carvalho)">
            </div>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
              <input type="text" id="novaEscolaCidade" placeholder="Cidade (Ex: Piripiri)" style="flex-grow: 1; margin-bottom: 0;">
              <button type="button" id="btnSalvarNovaEscola" class="btn btn-primary" style="min-height: auto; width: auto; padding: 0.9rem 1.5rem;">Salvar</button>
            </div>
            <small id="alertaEscola" style="color: var(--error-color); display: none; margin-top: 0.5rem; font-weight: 600;"></small>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="btnSubmit">Cadastrar Usuário</button>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('formCadastro');
    const roleSelect = document.getElementById('role');
    const camposMonitor = document.getElementById('camposMonitor');
    const camposProfissional = document.getElementById('camposProfissional');
    const blocoEspecialidade = document.getElementById('blocoEspecialidade');
    const alertBox = document.getElementById('alertBox');
    const btnSubmit = document.getElementById('btnSubmit');

    // ==========================================
    // LÓGICA DE ESCOLAS (NOVA)
    // ==========================================
    const selectEscola = document.getElementById('escolaVinculada');
    const btnToggleNovaEscola = document.getElementById('btnToggleNovaEscola');
    const blocoNovaEscola = document.getElementById('blocoNovaEscola');
    const btnSalvarNovaEscola = document.getElementById('btnSalvarNovaEscola');
    const alertaEscola = document.getElementById('alertaEscola');

    async function carregarEscolas(escolaSelecionada = null) {
      try {
        const response = await fetch('/api/escolas');
        const data = await response.json();
        
        selectEscola.innerHTML = '<option value="" disabled selected>Selecione uma escola...</option>';
        data.escolas.forEach(escola => {
          const option = document.createElement('option');
          option.value = escola.nome; 
          option.textContent = `${escola.nome} - ${escola.cidade}/${escola.estado}`;
          selectEscola.appendChild(option);
        });

        if (escolaSelecionada) selectEscola.value = escolaSelecionada;
      } catch (error) {
        selectEscola.innerHTML = '<option value="" disabled>Erro ao carregar escolas</option>';
      }
    }

    btnToggleNovaEscola.addEventListener('click', () => {
      blocoNovaEscola.style.display = blocoNovaEscola.style.display === 'none' ? 'block' : 'none';
    });

    btnSalvarNovaEscola.addEventListener('click', async () => {
      const nome = document.getElementById('novaEscolaNome').value.trim();
      const cidade = document.getElementById('novaEscolaCidade').value.trim();
      alertaEscola.style.display = 'none';

      if (!nome || !cidade) {
        alertaEscola.innerText = 'Preencha o nome e a cidade.';
        alertaEscola.style.display = 'block';
        return;
      }

      btnSalvarNovaEscola.innerText = 'Salvando...';
      btnSalvarNovaEscola.disabled = true;

      try {
        const response = await fetch('/api/escolas', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nome, cidade })
        });
        const data = await response.json();

        if (response.ok) {
          document.getElementById('novaEscolaNome').value = '';
          document.getElementById('novaEscolaCidade').value = '';
          blocoNovaEscola.style.display = 'none';
          await carregarEscolas(data.escola.nome);
        } else {
          alertaEscola.innerText = data.error || 'Erro ao salvar escola.';
          alertaEscola.style.display = 'block';
        }
      } catch (error) {
        alertaEscola.innerText = 'Erro no servidor.';
        alertaEscola.style.display = 'block';
      } finally {
        btnSalvarNovaEscola.innerText = 'Salvar';
        btnSalvarNovaEscola.disabled = false;
      }
    });

    carregarEscolas();

    // ==========================================
    // LÓGICA DE INTERFACE DE PERFIS (CORRIGIDA)
    // ==========================================
    roleSelect.addEventListener('change', function() {
      camposMonitor.style.display = 'none';
      camposProfissional.style.display = 'none';

      if (this.value === 'MONITOR') {
        camposMonitor.style.display = 'block';
      } else if (this.value === 'MULTIPROFISSIONAL' || this.value === 'COORDENADOR') {
        // Agora o Coordenador também visualiza o bloco de escola
        camposProfissional.style.display = 'block';
        
        // Esconde o campo de especialidade médica se for Coordenador
        if (this.value === 'COORDENADOR') {
          blocoEspecialidade.style.display = 'none';
        } else {
          blocoEspecialidade.style.display = 'block';
        }
      }
    });

    // ==========================================
    // LÓGICA DE CADASTRO (CORRIGIDA)
    // ==========================================
    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      
      btnSubmit.innerText = 'Cadastrando...';
      btnSubmit.disabled = true;
      alertBox.style.display = 'none';

      const payload = {
        nome: document.getElementById('nome').value,
        email: document.getElementById('email').value,
        matricula: document.getElementById('matricula').value,
        senha: document.getElementById('senha').value,
        role: roleSelect.value
      };

      if (payload.role === 'MONITOR') {
        payload.dadosMonitor = {
          turma: document.getElementById('turma').value,
          turno: document.getElementById('turno').value
        };
      } else if (payload.role === 'MULTIPROFISSIONAL' || payload.role === 'COORDENADOR') {
        // Captura a escola vinculada para ambos os perfis de gestão
        payload.dadosProfissional = {
          especialidade: document.getElementById('especialidade').value || 'Coordenação',
          escolaVinculada: selectEscola.value
        };
      }

      // Validação extra de segurança no front-end
      if ((payload.role === 'MULTIPROFISSIONAL' || payload.role === 'COORDENADOR') && !payload.dadosProfissional.escolaVinculada) {
        mostrarAlerta('Por favor, selecione ou registre uma Escola Vinculada.', 'error');
        btnSubmit.innerText = 'Cadastrar Usuário';
        btnSubmit.disabled = false;
        return;
      }

      try {
        const response = await fetch('/api/cadastro', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok) {
          mostrarAlerta('Usuário cadastrado com sucesso!', 'success');
          form.reset();
          camposMonitor.style.display = 'none';
          camposProfissional.style.display = 'none';
        } else {
          mostrarAlerta(data.error || 'Erro ao realizar o cadastro.', 'error');
        }
      } catch (error) {
        mostrarAlerta('Erro de conexão com o servidor.', 'error');
      } finally {
        btnSubmit.innerText = 'Cadastrar Usuário';
        btnSubmit.disabled = false;
      }
    });

    function mostrarAlerta(mensagem, tipo) {
      alertBox.innerText = mensagem;
      alertBox.className = `alert alert-${tipo}`;
      alertBox.style.display = 'block';
    }
  </script>
</body>
</html>
