<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Apoio Multiprofissional - Mãos que Ensinam</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .urgencia-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .badge-BAIXO { background-color: var(--primary-light); color: var(--primary-color); }
    .badge-MÉDIO { background-color: #FEF9E7; color: #F39C12; }
    .badge-ALTO { background-color: #FDF2E9; color: #E67E22; }
    .badge-EMERGÊNCIA { background-color: #FADBD8; color: var(--error-color); border: 2px solid var(--error-color); }
    
    .chamado-item {
      border: 2px solid #E0E0E0;
      transition: var(--transition);
    }
    .chamado-item.resolvido {
      opacity: 0.7;
      border-color: var(--accent-light);
      background-color: #FAFAFA;
    }
    .meta-info {
      font-size: 0.9rem;
      color: var(--text-light);
      margin-bottom: 1rem;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .resposta-box {
      background-color: var(--accent-light);
      padding: 1rem;
      border-radius: var(--radius);
      margin-top: 1rem;
      border-left: 4px solid var(--accent-color);
    }
  </style>
</head>
<body>

  <div class="container" style="max-width: 1000px;">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
      <div>
        <h1>Painel de Mediação Escolar</h1>
        <p style="color: var(--text-light);">Acompanhamento de alertas e suporte técnico aos Alunos Monitores.</p>
      </div>
      <button id="btnSairApoio" class="btn btn-outline" style="width: auto; min-height: auto; padding: 0.5rem 1rem;">
        <i class="fa-solid fa-arrow-right-from-bracket"></i> Sair
      </button>
    </header>

    <div id="listaChamados">
      <div style="text-align: center; color: var(--text-light); padding: 3rem;">
        <i class="fa-solid fa-spinner fa-spin fa-2xl" style="color: var(--primary-color);"></i>
        <p style="margin-top: 1rem;">A carregar pedidos de apoio...</p>
      </div>
    </div>
  </div>

  <script src="js/painel-apoio.js"></script>
</body>
</html>
